---
layout: default
---

<div class="container">
  <a href="{{ '/research/' | relative_url }}" class="back-link">← Retour</a>

  <div class="writeup-header">
    <h1>{{ page.title }}</h1>
    <div class="meta">
      {% if page.date %}<span>{{ page.date | date: "%d %b %Y" }}</span>{% endif %}
      {% if page.tags %}
        {% for tag in page.tags %}
        <span class="tag tag-{{ tag | downcase }}">{{ tag }}</span>
        {% endfor %}
      {% endif %}
    </div>
  </div>

  <div class="content">
    {{ content }}
  </div>
</div>
