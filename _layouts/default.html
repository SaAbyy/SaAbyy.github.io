<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title and page.title != "Home" %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — CTF Player & Pentest Enthusiast{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/favicon.ico' | relative_url }}">
  {% seo %}
</head>
<body>

<nav class="nav">
  <a href="{{ '/' | relative_url }}" class="nav-logo"><span>~/</span>{{ site.title }}</a>
  <ul class="nav-links">
    <li><a href="{{ '/writeups/' | relative_url }}" {% if page.url contains '/writeups' %}class="active"{% endif %}>Writeups</a></li>
    <li><a href="{{ '/ctf/' | relative_url }}" {% if page.url contains '/ctf' %}class="active"{% endif %}>CTF</a></li>
    <li><a href="{{ '/about/' | relative_url }}" {% if page.url contains '/about' %}class="active"{% endif %}>About</a></li>
  </ul>
</nav>

{{ content }}

<footer class="footer">
  <div style="margin-bottom:0.5rem;">
    <a href="https://tryhackme.com/p/SaAby" target="_blank" rel="noopener">TryHackMe</a>
    <a href="https://app.hackthebox.com/public/users/1233395" target="_blank" rel="noopener">HackTheBox</a>
    <a href="https://www.root-me.org/SaAby" target="_blank" rel="noopener">Root-Me</a>
  </div>
  <div class="footer-copy">{{ site.title }} · Built with Jekyll + GitHub Pages</div>
</footer>

<script src="{{ '/assets/js/filter.js' | relative_url }}"></script>
</body>
</html>
