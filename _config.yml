url: "https://saabyy.github.io"
baseurl: ""

author:
  name: "SaAby"
  email: "Sa4by@proton.me"
  github: "SaAbyy"
  hackthebox: "1233395"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

collections:
  writeups:
    output: true
    permalink: /writeups/:slug/
  research:
    output: true
